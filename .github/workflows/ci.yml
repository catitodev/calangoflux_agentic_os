name: CI Pipeline

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ─── Stage 1: Lint ───────────────────────────────────────────────────────────
  lint-rust:
    name: Lint (Rust - clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  lint-go:
    name: Lint (Go - golangci-lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: picoclaw
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: golangci/golangci-lint-action@v4
        with:
          working-directory: picoclaw

  lint-typescript:
    name: Lint (TypeScript - eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            openclaw/package-lock.json
            admin-dashboard/package-lock.json
      - run: npm ci
        working-directory: openclaw
      - run: npm run lint
        working-directory: openclaw
      - run: npm ci
        working-directory: admin-dashboard
      - run: npm run lint
        working-directory: admin-dashboard

  # ─── Stage 2: Unit Tests ─────────────────────────────────────────────────────
  unit-test-rust:
    name: Unit Test (Rust)
    needs: [lint-rust]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  unit-test-go:
    name: Unit Test (Go)
    needs: [lint-go]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: picoclaw
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go test ./... -v -short

  unit-test-typescript:
    name: Unit Test (TypeScript)
    needs: [lint-typescript]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            openclaw/package-lock.json
            admin-dashboard/package-lock.json
      - run: npm ci
        working-directory: openclaw
      - run: npx vitest run
        working-directory: openclaw
      - run: npm ci
        working-directory: admin-dashboard
      - run: npx vitest run
        working-directory: admin-dashboard

  # ─── Stage 3: Property Tests (100+ iterations) ──────────────────────────────
  property-test-rust:
    name: Property Test (Rust - proptest)
    needs: [unit-test-rust]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace -- --include-ignored proptest
        env:
          PROPTEST_CASES: 100

  property-test-go:
    name: Property Test (Go - rapid)
    needs: [unit-test-go]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: picoclaw
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go test ./... -v -run "Property|Rapid" -count=1

  property-test-typescript:
    name: Property Test (TypeScript - fast-check)
    needs: [unit-test-typescript]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            openclaw/package-lock.json
            admin-dashboard/package-lock.json
      - run: npm ci
        working-directory: openclaw
      - run: npx vitest run --testPathPattern="property|pbt"
        working-directory: openclaw
      - run: npm ci
        working-directory: admin-dashboard
      - run: npx vitest run --testPathPattern="property|pbt"
        working-directory: admin-dashboard

  # ─── Stage 4: Build Docker Images (verify only) ─────────────────────────────
  build:
    name: Build Docker Images (verify)
    needs: [property-test-rust, property-test-go, property-test-typescript]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ironclaw
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ironclaw/Dockerfile
          push: false
          tags: ironclaw:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build calango-vallum
        uses: docker/build-push-action@v5
        with:
          context: .
          file: calango-vallum/Dockerfile
          push: false
          tags: calango-vallum:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build picoclaw
        uses: docker/build-push-action@v5
        with:
          context: .
          file: picoclaw/Dockerfile
          push: false
          tags: picoclaw:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build openclaw
        uses: docker/build-push-action@v5
        with:
          context: .
          file: openclaw/Dockerfile
          push: false
          tags: openclaw:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build admin-dashboard
        uses: docker/build-push-action@v5
        with:
          context: .
          file: admin-dashboard/Dockerfile
          push: false
          tags: admin-dashboard:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Stage 5: Integration Tests ─────────────────────────────────────────────
  integration:
    name: Integration Tests
    needs: [build]
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Rust integration tests
        env:
          REDIS_URL: redis://localhost:6379
        run: cargo test --workspace -- --ignored integration

      - name: Run Go integration tests
        env:
          REDIS_URL: redis://localhost:6379
        run: go test ./... -v -run "Integration"
        working-directory: picoclaw

      - name: Run TypeScript integration tests
        env:
          REDIS_URL: redis://localhost:6379
        run: |
          npm ci
          npx vitest run --testPathPattern="integration"
        working-directory: openclaw
