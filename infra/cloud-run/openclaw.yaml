# ============================================================
# OpenClaw — External Action Executor (TypeScript/Node.js)
# Cloud Run Service Configuration
# Scale-to-zero, handles external API integrations
# ============================================================
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: openclaw
  labels:
    app: calangoflux-agentic-os
    component: openclaw
  annotations:
    run.googleapis.com/launch-stage: GA
    run.googleapis.com/read-only-filesystem: "true"
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
        run.googleapis.com/startup-cpu-boost: "true"
        run.googleapis.com/cpu-throttling: "false"
    spec:
      containerConcurrency: 50
      timeoutSeconds: 300
      containers:
        - image: gcr.io/PROJECT_ID/openclaw:TAG
          ports:
            - containerPort: 8083
              name: http1
          resources:
            limits:
              cpu: "1"
              memory: 256Mi
          env:
            - name: PORT
              value: "8083"
            - name: NODE_ENV
              value: "production"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-url
                  key: latest
            - name: GOOGLE_CLOUD_PROJECT
              value: "PROJECT_ID"
          startupProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8083
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 3
