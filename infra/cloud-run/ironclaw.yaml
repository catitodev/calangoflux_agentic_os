# ============================================================
# IronClaw — Agent OS Runtime (Rust)
# Cloud Run Service Configuration
# ============================================================
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ironclaw
  labels:
    app: calangoflux-agentic-os
    component: ironclaw
  annotations:
    run.googleapis.com/launch-stage: GA
    run.googleapis.com/read-only-filesystem: "true"
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
        run.googleapis.com/startup-cpu-boost: "true"
        run.googleapis.com/cpu-throttling: "false"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: gcr.io/PROJECT_ID/ironclaw:TAG
          ports:
            - containerPort: 8080
              name: http1
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: PORT
              value: "8080"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-url
                  key: latest
            - name: RUST_LOG
              value: "info,ironclaw=debug"
            - name: GOOGLE_CLOUD_PROJECT
              value: "PROJECT_ID"
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 3
