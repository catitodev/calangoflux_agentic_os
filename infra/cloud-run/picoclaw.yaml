# ============================================================
# PicoClaw — Ultra-lightweight Task Router (Go)
# Cloud Run Service Configuration
# Scale-to-zero, fast startup (<1s)
# ============================================================
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: picoclaw
  labels:
    app: calangoflux-agentic-os
    component: picoclaw
  annotations:
    run.googleapis.com/launch-stage: GA
    run.googleapis.com/read-only-filesystem: "true"
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"
        run.googleapis.com/startup-cpu-boost: "true"
        run.googleapis.com/cpu-throttling: "false"
    spec:
      containerConcurrency: 100
      timeoutSeconds: 300
      containers:
        - image: gcr.io/PROJECT_ID/picoclaw:TAG
          ports:
            - containerPort: 8082
              name: http1
          resources:
            limits:
              cpu: "500m"
              memory: 128Mi
          env:
            - name: PORT
              value: "8082"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-url
                  key: latest
          startupProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 3
