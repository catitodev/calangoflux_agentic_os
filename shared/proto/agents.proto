syntax = "proto3";

package calangoflux.agents;

option go_package = "github.com/catitodev/calangoflux_agentic_os/picoclaw/proto";

// Inter-agent communication protocol definitions.

service AgentService {
  // Execute a task within an agent's sandbox.
  rpc ExecuteTask(TaskRequest) returns (TaskResponse);

  // Report agent health status.
  rpc ReportHealth(HealthReport) returns (HealthAck);
}

message TaskRequest {
  string task_id = 1;
  string sender_id = 2;
  string destination_id = 3;
  string intent = 4;
  bytes payload = 5;
  int64 timestamp = 6;
  int32 priority = 7;
}

message TaskResponse {
  string task_id = 1;
  string status = 2;  // "success" or "failure"
  bytes output = 3;
  int64 duration_ms = 4;
  string error = 5;
}

message HealthReport {
  string agent_id = 1;
  string status = 2;  // "healthy", "degraded", "dead"
  double cpu_usage = 3;
  uint64 memory_bytes = 4;
  int64 uptime_seconds = 5;
}

message HealthAck {
  bool acknowledged = 1;
}
